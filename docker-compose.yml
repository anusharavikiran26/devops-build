version: "3.9"

services:
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: anushark/dev:${TAG:-latest}
    container_name: devops-build-app
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
